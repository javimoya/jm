name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate command frontmatter
        run: python3 tests/check_commands.py

      - name: Syntax-check shell scripts
        run: bash -n install.sh uninstall.sh
